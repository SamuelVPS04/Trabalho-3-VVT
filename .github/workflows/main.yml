name: CI-CD VV&T

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  testes:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: db_vvt
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

    env:
      MYSQL_HOST: ${{ secrets.MYSQL_HOST }}
      MYSQL_PORT: ${{ secrets.MYSQL_PORT }}
      MYSQL_USER: ${{ secrets.MYSQL_USER }}
      MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
      MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar cliente MySQL e dependências Python
        run: |
          sudo apt-get update
          sudo apt-get install -y default-mysql-client
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verificar arquivos do projeto
        run: |
          pwd
          ls -la
          test -f schema.sql
          test -f requirements.txt
          test -f app.py
          echo "===== Conteúdo inicial de schema.sql ====="
          sed -n '1,120p' schema.sql

      - name: Aguardar MySQL ficar disponível
        run: |
          for i in {1..30}; do
            mysqladmin ping -h"$MYSQL_HOST" -P"$MYSQL_PORT" -u"$MYSQL_USER" -p"$MYSQL_PASSWORD" --silent && break
            echo "Aguardando MySQL..."
            sleep 2
          done

      - name: Criar banco e tabela automaticamente
        run: |
          mysql -h"$MYSQL_HOST" -P"$MYSQL_PORT" -u"$MYSQL_USER" -p"$MYSQL_PASSWORD" < schema.sql

      - name: Debug após aplicar schema
        run: |
          echo "===== Bancos disponíveis ====="
          mysql -h"$MYSQL_HOST" -P"$MYSQL_PORT" -u"$MYSQL_USER" -p"$MYSQL_PASSWORD" -e "SHOW DATABASES;"
          echo "===== Tabelas em $MYSQL_DATABASE ====="
          mysql -h"$MYSQL_HOST" -P"$MYSQL_PORT" -u"$MYSQL_USER" -p"$MYSQL_PASSWORD" -e "
            USE $MYSQL_DATABASE;
            SHOW TABLES;
            SELECT DATABASE() AS banco_atual;
          "

      - name: Validar estrutura criada
        run: |
          mysql -h"$MYSQL_HOST" -P"$MYSQL_PORT" -u"$MYSQL_USER" -p"$MYSQL_PASSWORD" -e "
            USE $MYSQL_DATABASE;
            SHOW TABLES;
            DESCRIBE codigos_sequenciais;
            SELECT COUNT(*) AS total_registros_iniciais FROM codigos_sequenciais;
          "

      - name: Executar testes automatizados com pytest
        run: |
          pytest -q

      - name: Executar inserção real e query de verificação
        run: |
          python app.py
          mysql -h"$MYSQL_HOST" -P"$MYSQL_PORT" -u"$MYSQL_USER" -p"$MYSQL_PASSWORD" -e "
            USE $MYSQL_DATABASE;
            SELECT id, codigo, sec, Grupo, Tipo_Alimento, Pais
            FROM codigos_sequenciais
            ORDER BY id DESC
            LIMIT 10;
          "
